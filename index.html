<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kapil Singh – Operations Team Lead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c8a96e;
  --gold2: #e8c98a;
  --gold3: rgba(200,169,110,0.1);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --muted: #6b7280;
  --border: rgba(200,169,110,0.18);
  --border2: rgba(255,255,255,0.07);
  --text: #f1ede6;
  --text2: rgba(241,237,230,0.55);
  --bg: #0c0b09;
  --bg2: #121109;
  --bg3: #171510;
  --card: rgba(255,255,255,0.03);
  --nav-h: 60px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

[data-theme="light"] {
  --gold: #9a7340;
  --gold2: #b8892a;
  --gold3: rgba(154,115,64,0.1);
  --border: rgba(154,115,64,0.2);
  --border2: rgba(0,0,0,0.07);
  --text: #1c1814;
  --text2: rgba(28,24,20,0.55);
  --bg: #faf7f2;
  --bg2: #f3ede4;
  --bg3: #ede5d8;
  --card: rgba(0,0,0,0.025);
  --nav-h: 60px;
}

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.35;
}

/* ── BACKGROUND CANVAS ── */
#bgCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.55;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 800;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 3rem;
  transition: background 0.3s, border-color 0.3s;
}
nav.scrolled {
  background: rgba(12,11,9,0.88);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border2);
}
[data-theme="light"] nav.scrolled { background: rgba(250,247,242,0.9); }

.nav-logo {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-style: italic;
  color: var(--gold2);
  letter-spacing: 0.02em;
}

.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  color: var(--text2);
  text-decoration: none;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: color 0.2s;
  font-weight: 500;
}
.nav-links a:hover { color: var(--gold2); }

.nav-right { display: flex; align-items: center; gap: 1.5rem; }

.theme-btn {
  width: 36px; height: 20px;
  border-radius: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: background 0.3s;
}
.theme-btn::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gold);
  transition: transform 0.3s;
}
[data-theme="light"] .theme-btn::after { transform: translateX(16px); }

/* ── OTW ── */
.otw {
  position: fixed;
  bottom: 1.5rem; right: 1.5rem;
  z-index: 700;
  display: flex; align-items: center; gap: 6px;
  background: rgba(74,222,128,0.08);
  border: 1px solid rgba(74,222,128,0.25);
  color: var(--green);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  font-family: var(--font-mono);
}
.otw-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── HERO ── */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: calc(var(--nav-h) + 5rem) 5rem 5rem;
  z-index: 1;
}

.hero-inner {
  max-width: 720px;
  position: relative;
  z-index: 2;
}

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--gold);
  margin-bottom: 2rem;
  letter-spacing: 0.06em;
}
.hero-tag::before { content: '//'; opacity: 0.5; }

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(3.5rem, 8vw, 6.5rem);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin-bottom: 1.5rem;
}
.h1-line1 { display: block; color: var(--text); }
.h1-line2 {
  display: block;
  font-style: italic;
  font-weight: 400;
  color: var(--gold2);
  font-size: 0.82em;
}

.hero-typing {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: var(--text2);
  margin-bottom: 1.6rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.typing-prompt { color: var(--gold); }
.typing-word { color: var(--text); }
.typing-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--gold);
  vertical-align: middle;
  animation: cursor-blink 0.7s step-end infinite;
}
@keyframes cursor-blink { 50%{opacity:0} }

.hero-desc {
  font-size: 1rem;
  color: var(--text2);
  line-height: 1.9;
  font-weight: 300;
  max-width: 520px;
  margin-bottom: 2.2rem;
}

.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 2rem;
  font-size: 0.8rem;
  color: var(--text2);
}
.hero-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.hero-meta-item svg { stroke: var(--gold); flex-shrink: 0; }

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  margin-bottom: 1.8rem;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 22px;
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  position: relative;
  overflow: hidden;
}
.btn:hover { transform: translateY(-2px); }

.btn-primary {
  background: var(--gold);
  color: var(--bg);
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.btn-primary:hover { background: var(--gold2); box-shadow: 0 8px 24px rgba(200,169,110,0.25); }

.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold2); background: var(--gold3); }

.social-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }
.social-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text2);
  text-decoration: none;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
  transition: border-color 0.2s, color 0.2s;
}
.social-pill:hover { border-color: var(--gold); color: var(--gold2); }

/* ── CUSTOM CURSOR ── */
*, *::before, *::after { cursor: none !important; }
.cursor-dot {
  position: fixed;
  width: 8px; height: 8px;
  background: var(--gold2);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s, background 0.2s, width 0.2s, height 0.2s;
  mix-blend-mode: difference;
}
.cursor-ring {
  position: fixed;
  width: 36px; height: 36px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  transition: width 0.25s ease, height 0.25s ease, border-color 0.25s, opacity 0.25s;
  opacity: 0.6;
}
.cursor-ring.hovering {
  width: 56px; height: 56px;
  border-color: var(--gold2);
  opacity: 1;
}
.cursor-dot.hovering {
  width: 4px; height: 4px;
  background: var(--gold2);
}

/* ── HERO SIDE ── */
.hero-avatar {
  position: absolute;
  right: 5rem;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
}

/* Outer container — no rotation, just sizes the space */
.avatar-wrap {
  position: relative;
  width: 320px;
  height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Each orbit ring is absolutely centered via top/left + negative margin.
   Keyframes ONLY rotate — no translate conflict. */
.orbit {
  position: absolute;
  border-radius: 50%;
  border: 1px solid var(--border);
}
.orbit-1 {
  width: 220px; height: 220px;
  top: 50%; left: 50%;
  margin-top: -110px; margin-left: -110px;
  border-color: rgba(200,169,110,0.4);
  animation: spin-cw 18s linear infinite;
}
.orbit-2 {
  width: 270px; height: 270px;
  top: 50%; left: 50%;
  margin-top: -135px; margin-left: -135px;
  border-color: rgba(200,169,110,0.2);
  animation: spin-ccw 28s linear infinite;
}
.orbit-3 {
  width: 320px; height: 320px;
  top: 50%; left: 50%;
  margin-top: -160px; margin-left: -160px;
  border-color: rgba(200,169,110,0.08);
  animation: spin-cw 42s linear infinite;
}

/* Glowing dots on orbit-1 */
.orbit-1::before, .orbit-1::after {
  content: '';
  position: absolute;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px 2px var(--gold);
}
.orbit-1::before { top: -3.5px; left: calc(50% - 3.5px); }
.orbit-1::after  { bottom: -3.5px; left: calc(50% - 3.5px); }

/* Glowing dot on orbit-2 */
.orbit-2::before {
  content: '';
  position: absolute;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold2);
  box-shadow: 0 0 8px var(--gold2);
  right: -2.5px;
  top: calc(50% - 2.5px);
}

@keyframes spin-cw  { from { transform: rotate(0deg);    } to { transform: rotate(360deg);  } }
@keyframes spin-ccw { from { transform: rotate(0deg);    } to { transform: rotate(-360deg); } }

.avatar-inner {
  position: relative;
  z-index: 2;
  width: 170px; height: 170px;
  border-radius: 50%;
  background: var(--gold3);
  border: 1.5px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--gold2);
  box-shadow: 0 0 40px rgba(200,169,110,0.12), inset 0 0 30px rgba(200,169,110,0.06);
}

/* ── SCROLL HINT ── */
.scroll-hint {
  position: absolute;
  bottom: 2.5rem;
  left: 5rem;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  z-index: 2;
}
.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: scroll-pulse 2s ease-in-out infinite;
}
@keyframes scroll-pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ── STATS STRIP ── */
.stats {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.stat {
  padding: 2rem 1.5rem;
  text-align: center;
  border-right: 1px solid var(--border);
  transition: background 0.3s;
}
.stat:last-child { border-right: none; }
.stat:hover { background: var(--gold3); }
.stat-n {
  font-family: var(--font-display);
  font-size: 2.6rem;
  font-weight: 700;
  color: var(--gold2);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-l {
  font-size: 0.67rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: var(--font-mono);
}

/* ── LIVE STRIP ── */
.live-strip {
  position: relative;
  z-index: 1;
  background: var(--bg);
  border-bottom: 1px solid var(--border2);
  padding: 0.75rem 5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.live-left {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.8rem;
  color: var(--text2);
  font-family: var(--font-mono);
}
.live-count {
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: var(--gold2);
  font-weight: 700;
}
.live-right { font-size: 0.7rem; color: var(--muted); font-family: var(--font-mono); }

/* ── SECTIONS ── */
.section {
  position: relative;
  z-index: 1;
  padding: 5rem 5rem;
}
.section.alt { background: var(--bg2); }

.sec-eyebrow {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
}
.sec-eyebrow::before { content: '//'; opacity: 0.5; }

.sec-title {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 3.5vw, 2.5rem);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 3rem;
}
.sec-title em { font-style: italic; color: var(--gold2); }

/* ── DASHBOARD ── */
.dash {
  border: 1px solid var(--border);
  background: var(--bg3);
  overflow: hidden;
}
.dash-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border2);
  background: var(--card);
}
.dash-title {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--gold);
  letter-spacing: 0.08em;
}
.dash-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--green);
}
.dash-body { padding: 1.5rem; }

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.metric {
  background: var(--card);
  border: 1px solid var(--border2);
  padding: 1.2rem;
  text-align: center;
  transition: border-color 0.25s;
}
.metric:hover { border-color: var(--gold); }
.metric-n {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold2);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}
.metric-l {
  font-size: 0.66rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-family: var(--font-mono);
}

.bar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.bar-section-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}
.bar-item { margin-bottom: 0.85rem; }
.bar-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  color: var(--text2);
  margin-bottom: 5px;
}
.bar-pct { color: var(--gold); font-family: var(--font-mono); font-size: 0.72rem; }
.bar-track {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 2px;
  width: 0;
  transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.current-work {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  background: var(--green-dim);
  border: 1px solid rgba(74,222,128,0.2);
  border-left: 3px solid var(--green);
  padding: 0.85rem 1.2rem;
  margin-top: 1.5rem;
  font-size: 0.84rem;
  color: var(--text2);
}
.current-work strong { color: var(--green); }

/* ── ABOUT ── */
.about-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 4rem; align-items: start; }
.about-text p {
  color: var(--text2);
  line-height: 1.95;
  margin-bottom: 1.1rem;
  font-weight: 300;
  font-size: 0.97rem;
}
.info-list { display: flex; flex-direction: column; gap: 0.75rem; }
.info-item {
  border: 1px solid var(--border2);
  background: var(--card);
  padding: 1rem 1.2rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.25s, transform 0.25s;
}
.info-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--gold);
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform 0.3s;
}
.info-item:hover { transform: translateX(4px); border-color: var(--border); }
.info-item:hover::before { transform: scaleY(1); }
.info-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 3px;
}
.info-value { font-size: 0.86rem; color: var(--text2); font-weight: 300; }

/* ── TIMELINE ── */
.timeline { position: relative; padding-left: 2.5rem; }
.tl-spine {
  position: absolute;
  left: 4px; top: 12px; bottom: 12px;
  width: 1px;
  background: var(--border);
  transform-origin: top;
  transform: scaleY(0);
  transition: transform 2s cubic-bezier(0.4,0,0.2,1);
}
.tl-spine.drawn { transform: scaleY(1); }

.tl-item { position: relative; margin-bottom: 2.8rem; }
.tl-dot {
  position: absolute;
  left: -2.75rem;
  top: 10px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--gold);
  transition: background 0.2s, box-shadow 0.2s;
}
.tl-item:hover .tl-dot { background: var(--gold); box-shadow: 0 0 12px rgba(200,169,110,0.5); }

.tl-date {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.tl-role {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.tl-org { font-size: 0.84rem; color: var(--muted); margin-bottom: 0.75rem; font-weight: 300; }
.tl-points { list-style: none; }
.tl-points li {
  font-size: 0.85rem;
  color: var(--text2);
  padding: 3px 0 3px 14px;
  position: relative;
  line-height: 1.75;
  font-weight: 300;
}
.tl-points li::before { content: '›'; position: absolute; left: 0; color: var(--gold); }

/* ── SKILLS ── */
.skills-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
.skill-list { display: flex; flex-direction: column; gap: 1rem; }
.skill-item {}
.skill-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
.skill-name { font-size: 0.85rem; color: var(--text); }
.skill-pct { font-family: var(--font-mono); font-size: 0.75rem; color: var(--gold); }
.skill-track { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.skill-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 2px; width: 0; transition: width 1.3s cubic-bezier(0.4,0,0.2,1); }

.tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.8rem; }
.tool-card {
  border: 1px solid var(--border2);
  padding: 1.2rem 0.8rem;
  text-align: center;
  background: var(--card);
  transition: border-color 0.25s, transform 0.25s;
}
.tool-card:hover { border-color: var(--gold); transform: translateY(-3px); }
.tool-icon { font-size: 1.6rem; margin-bottom: 0.4rem; display: block; }
.tool-name { font-size: 0.72rem; color: var(--text2); font-family: var(--font-mono); }

/* ── ACHIEVEMENTS ── */
.ach-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
.ach-card {
  background: var(--card);
  border: 1px solid var(--border2);
  padding: 2rem 1.6rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s, border-color 0.25s;
}
.ach-card:hover { transform: translateY(-4px); border-color: var(--border); }
.ach-n {
  font-family: var(--font-display);
  font-size: 5rem;
  font-weight: 900;
  color: rgba(200,169,110,0.06);
  position: absolute;
  top: 0.5rem; right: 1rem;
  line-height: 1;
  pointer-events: none;
}
.ach-icon { font-size: 1.3rem; margin-bottom: 0.7rem; display: block; }
.ach-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--gold2);
  margin-bottom: 0.4rem;
}
.ach-desc { font-size: 0.83rem; color: var(--text2); line-height: 1.8; font-weight: 300; }
