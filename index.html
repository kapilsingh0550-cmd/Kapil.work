<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapil.work</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 12px 25px;
            background: #ff7a18;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff9a3c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Welcome to Kapil.work</h1>
        <p>This website is successfully connected to GitHub Pages.</p>
        <p>Your domain setup is working perfectly 🎉</p>

        <a href="https://github.com/" class="btn">Visit My GitHub</a>
    </div>

</body>
</html>
